<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>
</head>
<body>

<div class="container">
<form >

    <h1 >heat index</h1>

    <label >Temperature</label>
    <br>
    <input type="number" id="T" class="form-control">
    <br>

        <label >Humidity</label>
    <br>
    <input type="number" id="H" class="form-control">
    <br>

    <input type="submit" class="btn btn-light" onclick="HeatIndex()" value="Check">


</form>

</div>

<script>
    function HeatIndex(){
        var degrees=parseFloat(document.getElementById("T").value);
        var Humid=parseFloat(document.getElementById("H").value);
        var Hi=degrees  +(0.33 * Humid) - 4;

        var status="";

        switch(true){
            case (Hi <= 27):
                status="comfortable/cool";
                break;
             case (Hi <= 32):
                status="Warm";
                break;
                 case (Hi <= 37):
                status="Hot";
                break;
                 case (Hi <= 41):
                status="Very hot/caution";
                break;
                 case (Hi >= 42):
                status="extreme heat";
                break;

        }
        alert(status);
    }
</script>

</body>
</html>
